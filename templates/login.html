<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0f172a">
    <title>Iniciar Sesion - Mini CRM</title>
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 1rem;
        }
    </style>
</head>
<body>
    <div class="card" style="width: 100%; max-width: 400px; padding: 2rem 1.5rem;">
        <div style="text-align: center; margin-bottom: 2rem;">
            <h1 style="font-size: 1.5rem; margin-bottom: 0.5rem; background: linear-gradient(135deg, #818cf8, #34d399); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;">
                Mini CRM Leads
            </h1>
            <div class="demo-badge" style="display: inline-flex; margin-bottom: 0.75rem;">Cuenta DEMO</div>
            <p style="color: var(--text-muted); font-size: 0.9rem;">Inicia sesion para continuar</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <div class="alert-container">
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category }}">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                {% if category == 'success' %}
                                    <polyline points="20 6 9 17 4 12"></polyline>
                                {% else %}
                                    <circle cx="12" cy="12" r="10"></circle>
                                    <line x1="12" y1="8" x2="12" y2="12"></line>
                                    <line x1="12" y1="16" x2="12.01" y2="16"></line>
                                {% endif %}
                            </svg>
                            <span>{{ message }}</span>
                        </div>
                    {% endfor %}
                </div>
            {% endif %}
        {% endwith %}

        <form action="{{ url_for('auth.login') }}" method="POST">
            <div class="form-group">
                <label for="username">Usuario</label>
                <input type="text" name="username" id="username" class="form-control" required autofocus
                       placeholder="Tu usuario" autocomplete="username">
            </div>

            <div class="form-group">
                <label for="password">Contrasena</label>
                <input type="password" name="password" id="password" class="form-control" required
                       placeholder="Tu contrasena" autocomplete="current-password">
            </div>

            <button type="submit" class="btn btn-primary btn-full" style="margin-top: 0.5rem;">
                Iniciar Sesion
            </button>
        </form>
    </div>
</body>
</html>
